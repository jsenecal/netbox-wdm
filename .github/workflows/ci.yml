name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check netbox_wdm/
      - run: ruff format --check netbox_wdm/

  test-ts:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd netbox_wdm/static/netbox_wdm && npm install
      - name: Typecheck
        run: cd netbox_wdm/static/netbox_wdm && npx tsc --noEmit

  test:
    name: Test (Python ${{ matrix.python-version }}, NetBox ${{ matrix.netbox-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        netbox-version: ["4.5.4", "4.5.5"]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: netbox
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev gdal-bin libgdal-dev libgeos-dev libproj-dev
      - name: Clone NetBox
        run: git clone --depth 1 --branch v${{ matrix.netbox-version }} https://github.com/netbox-community/netbox.git /opt/netbox
      - name: Install NetBox and plugin
        run: |
          cd /opt/netbox
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov
          pip install -e "${GITHUB_WORKSPACE}"
      - name: Configure NetBox
        run: |
          cat > /opt/netbox/netbox/netbox/configuration.py << 'CONF'
          ALLOWED_HOSTS = ['*']
          DATABASE = {
              'NAME': 'netbox', 'USER': 'netbox', 'PASSWORD': 'netbox',
              'HOST': 'localhost', 'PORT': '5432', 'CONN_MAX_AGE': 300,
              'ENGINE': 'django.contrib.gis.db.backends.postgis',
          }
          REDIS = {
              'tasks': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 0},
              'caching': {'HOST': 'localhost', 'PORT': 6379, 'DATABASE': 1},
          }
          SECRET_KEY = 'test-secret-key-not-for-production-use-1234567890abcdef'
          PLUGINS = ['netbox_wdm']
          PLUGINS_CONFIG = {}
          CONF
      - name: Run migrations
        run: cd /opt/netbox/netbox && python manage.py migrate
      - name: Run tests
        run: cd /opt/netbox/netbox && python -m pytest "${GITHUB_WORKSPACE}/tests/" -v --tb=short -p no:reuse-db --create-db
        env:
          DJANGO_SETTINGS_MODULE: netbox.settings
